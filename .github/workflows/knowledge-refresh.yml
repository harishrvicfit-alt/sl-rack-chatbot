name: Refresh SL Rack knowledge

on:
  schedule:
    - cron: '20 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: knowledge-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements-knowledge.txt
      - run: npm ci
      - run: npm run ingest:downloads
        env:
          PYTHON: python
      - run: npm run check:knowledge
      - run: npm run test:links
      - run: npm test
      - name: Commit refreshed index
        run: |
          if git diff --quiet -- data/knowledge-index.json; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/knowledge-index.json
          git commit -m "chore: refresh SL Rack knowledge index"
          git push
